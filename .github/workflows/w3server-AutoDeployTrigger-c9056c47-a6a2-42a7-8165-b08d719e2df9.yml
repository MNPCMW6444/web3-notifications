name: Trigger auto deployment for w3server

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ server ]
    paths:
    - '**'
    - '.github/workflows/w3server-AutoDeployTrigger-c9056c47-a6a2-42a7-8165-b08d719e2df9.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.W3SERVER_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }} 
          registryUrl: w3notif.azurecr.io
          registryUsername: ${{ secrets.W3SERVER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.W3SERVER_REGISTRY_PASSWORD }}
          containerAppName: w3server
          resourceGroup: braikupcluster
          imageToBuild: w3notif.azurecr.io/server:${{ github.sha }}
          
            

     

